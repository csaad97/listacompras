<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Compras Sync</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: sans-serif; background: #f7f5f0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e8e4df; }
    .btn { background: #1a1a1a; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="root">Carregando...</div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyCLGKHLFDIDYcyH-VHG3RRF4YASDnGLFYE",
      authDomain: "listacompras-f5210.firebaseapp.com",
      projectId: "listacompras-f5210",
      storageBucket: "listacompras-f5210.firebasestorage.app",
      messagingSenderId: "1062082191988",
      appId: "1:1062082191988:web:159c3227ea89c8aaa8a721",
      measurementId: "G-FTNYDTWJWP"
    };
    
    // Inicializa Firebase de forma global
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function App() {
      const [code] = React.useState(localStorage.getItem('roomCode') || '5EBBIK');
      const [data, setData] = React.useState(null);

      React.useEffect(() => {
        // Escuta o banco de dados
        const unsub = db.collection("listas").doc(code).onSnapshot(doc => {
          if (doc.exists) {
            setData(doc.data());
          } else {
            setData({ items: [], caixa: 0, reserva: 0 });
          }
        });
        return () => unsub();
      }, [code]);

      if (!data) return <div>Carregando lista...</div>;

      return (
        <div className="container">
          <div className="card">
            <h2>Lista: {code}</h2>
            <p><strong>Caixa:</strong> R$ {data.caixa ? data.caixa.toFixed(2) : "0.00"}</p>
            <p><strong>Reserva:</strong> R$ {data.reserva ? data.reserva.toFixed(2) : "0.00"}</p>
          </div>
          {data.items.map((i, idx) => (
            <div key={idx} className="card">{i.name}</div>
          ))}
        </div>
      );
    }

    // Renderiza apenas quando o DOM estiver pronto
    window.addEventListener('DOMContentLoaded', () => {
      ReactDOM.render(<App />, document.getElementById('root'));
    });
  </script>
</body>
</html>
