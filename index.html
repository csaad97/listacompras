<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Compras Sync</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, updateDoc, deleteField } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyCLGKHLFDIDYcyH-VHG3RRF4YASDnGLFYE",
      authDomain: "listacompras-f5210.firebaseapp.com",
      projectId: "listacompras-f5210",
      storageBucket: "listacompras-f5210.firebasestorage.app",
      messagingSenderId: "1062082191988",
      appId: "1:1062082191988:web:159c3227ea89c8aaa8a721",
      measurementId: "G-FTNYDTWJWP"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
    window.doc = doc;
    window.setDoc = setDoc;
    window.onSnapshot = onSnapshot;
    window.updateDoc = updateDoc;
  </script>
  <style>
    /* Mantendo o mesmo estilo visual anterior para consistência */
    body { font-family: -apple-system, sans-serif; background: #f7f5f0; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { db, doc, onSnapshot, setDoc, updateDoc } = window;

    function App() {
      const [roomCode, setRoomCode] = useState(localStorage.getItem('roomCode') || '');
      const [data, setData] = useState({ items: [], reserva: 0, caixa: 0 });

      useEffect(() => {
        if (!roomCode) return;
        const unsubscribe = onSnapshot(doc(db, "listas", roomCode), (doc) => {
          if (doc.exists()) {
            setData(doc.data());
          }
        });
        return () => unsubscribe();
      }, [roomCode]);

      // Função para salvar no Firebase
      const updateFirebase = async (newData) => {
        await setDoc(doc(db, "listas", roomCode), newData, { merge: true });
      };

      // Exemplo de como adicionar item (você pode adaptar seus botões)
      const addItem = (item) => {
        const newItems = [...data.items, { ...item, id: Date.now() }];
        updateFirebase({ items: newItems });
      };

      if (!roomCode) {
        return <button onClick={() => { 
          const code = Math.random().toString(36).slice(2,8).toUpperCase();
          localStorage.setItem('roomCode', code);
          setRoomCode(code);
          setDoc(doc(db, "listas", code), { items: [], reserva: 0, caixa: 0 });
        }}>Criar Nova Lista na Nuvem</button>;
      }

      return (
        <div className="container">
          <h2>Lista: {roomCode}</h2>
          <p>Saldo Caixa: R$ {data.caixa.toFixed(2)}</p>
          <button onClick={() => updateFirebase({ caixa: data.caixa + 100 })}>Adicionar R$ 100 ao Caixa</button>
          <div>
            {data.items.map(i => <div key={i.id}>{i.name} - R$ {i.price}</div>)}
          </div>
        </div>
      );
    }
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
