<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Compras Sync</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: sans-serif; background: #f7f5f0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; text-align: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyCLGKHLFDIDYcyH-VHG3RRF4YASDnGLFYE",
      authDomain: "listacompras-f5210.firebaseapp.com",
      projectId: "listacompras-f5210",
      storageBucket: "listacompras-f5210.firebasestorage.app",
      messagingSenderId: "1062082191988",
      appId: "1:1062082191988:web:159c3227ea89c8aaa8a721",
      measurementId: "G-FTNYDTWJWP"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function App() {
      const [code, setCode] = useState(localStorage.getItem('roomCode') || '');
      const [data, setData] = useState({ items: [] });

      useEffect(() => {
        if (code) {
          return db.collection("listas").doc(code).onSnapshot(doc => {
            if (doc.exists) setData(doc.data());
          });
        }
      }, [code]);

      const create = () => {
        const newCode = Math.random().toString(36).slice(2,8).toUpperCase();
        db.collection("listas").doc(newCode).set({ items: [] });
        localStorage.setItem('roomCode', newCode);
        setCode(newCode);
      };

      if (!code) return <button onClick={create}>Criar Lista na Nuvem</button>;

      return (
        <div className="container">
          <h1>Lista: {code}</h1>
          <button onClick={() => {
            const newItem = { id: Date.now(), name: "Teste Sync" };
            db.collection("listas").doc(code).update({
              items: firebase.firestore.FieldValue.arrayUnion(newItem)
            });
          }}>Adicionar Item de Teste</button>
          {data.items.map(i => <p key={i.id}>{i.name}</p>)}
        </div>
      );
    }
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
