<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Compras Sync</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f7f5f0; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e8e4df; }
    button { background: #1a1a1a; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 5px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyCLGKHLFDIDYcyH-VHG3RRF4YASDnGLFYE",
      authDomain: "listacompras-f5210.firebaseapp.com",
      projectId: "listacompras-f5210",
      storageBucket: "listacompras-f5210.firebasestorage.app",
      messagingSenderId: "1062082191988",
      appId: "1:1062082191988:web:159c3227ea89c8aaa8a721",
      measurementId: "G-FTNYDTWJWP"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function App() {
      const [code, setCode] = React.useState(localStorage.getItem('roomCode') || '');
      const [data, setData] = React.useState({ items: [], caixa: 0, reserva: 0 });

      React.useEffect(() => {
        if (code) {
          return db.collection("listas").doc(code).onSnapshot(doc => {
            if (doc.exists) setData(doc.data());
          });
        }
      }, [code]);

      const create = () => {
        const newCode = Math.random().toString(36).slice(2,8).toUpperCase();
        db.collection("listas").doc(newCode).set({ items: [], caixa: 0, reserva: 0 });
        localStorage.setItem('roomCode', newCode);
        setCode(newCode);
      };

      if (!code) return <div className="container"><button onClick={create}>Criar Lista Sincronizada</button></div>;

      return (
        <div className="container">
          <div className="card">
            <h2>Lista: {code}</h2>
            <p><strong>Caixa:</strong> R$ {data.caixa?.toFixed(2)} | <strong>Reserva:</strong> R$ {data.reserva?.toFixed(2)}</p>
            <button onClick={() => db.collection("listas").doc(code).update({ caixa: data.caixa + 100 })}>Adicionar R$ 100 ao Caixa</button>
          </div>
          {data.items.map(i => <div key={i.id} className="card">{i.name} - R$ {i.price}</div>)}
        </div>
      );
    }
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
