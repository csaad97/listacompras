<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f5f0; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e8e4df; }
    .header h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
    .header p { font-size: 13px; color: #6b6560; }
    .btn { background: #1a1a1a; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; width: 100%; margin-top: 10px; }
    .btn:hover { opacity: 0.9; }
    .btn-outline { background: transparent; color: #1a1a1a; border: 1.5px solid #e8e4df; }
    input, select, textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #e8e4df; border-radius: 10px; font-size: 14px; margin-bottom: 12px; font-family: inherit; }
    .label { font-size: 11px; font-weight: 700; color: #6b6560; margin-bottom: 6px; display: block; letter-spacing: 0.06em; }
    .item { background: white; border: 1.5px solid #e8e4df; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .item-name { font-weight: 700; color: #1a1a1a; font-size: 16px; }
    .item-price { font-weight: 800; color: #2d7a4f; font-size: 15px; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; }
    .modal.active { display: flex; align-items: flex-end; justify-content: center; }
    .modal-content { background: white; border-radius: 20px 20px 0 0; padding: 24px; width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h2 { font-size: 17px; font-weight: 800; }
    .close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #6b6560; }
    .setup { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .setup-card { background: white; border: 1px solid #e8e4df; border-radius: 20px; padding: 32px; text-align: center; width: 100%; max-width: 380px; }
    .setup-card h1 { font-size: 22px; font-weight: 900; margin: 12px 0 6px 0; }
    .setup-card p { font-size: 13px; color: #6b6560; margin-bottom: 28px; }
    .setup-card .btn { margin-top: 10px; }
    .back-btn { background: none; border: none; color: #6b6560; cursor: pointer; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const DEMO_ITEMS = [
      { id: 1, name: 'Máquina de lavar louças', price: 2800, status: 'quero', category: 'Cozinha', priority: 'Planejado' },
      { id: 2, name: 'Balança para café', price: 380, status: 'quero', category: 'Cozinha', priority: 'Assim que der' },
    ];

    const genCode = () => Math.random().toString(36).slice(2, 8).toUpperCase();

    function App() {
      const [myName] = useState(() => localStorage.getItem('myName') || '');
      const [roomCode] = useState(() => localStorage.getItem('roomCode') || '');
      const [setupStep, setSetupStep] = useState(() => localStorage.getItem('roomCode') ? 'done' : 'choose');
      
      const [nameInput, setNameInput] = useState('');
      const [codeInput, setCodeInput] = useState('');
      const [items, setItems] = useState(() => {
        const saved = localStorage.getItem('items');
        return saved ? JSON.parse(saved) : DEMO_ITEMS;
      });
      const [showModal, setShowModal] = useState(false);
      
      // Novos estados para a Fase 1
      const [formName, setFormName] = useState('');
      const [formPrice, setFormPrice] = useState('');
      const [formBrand, setFormBrand] = useState('');
      const [formCategory, setFormCategory] = useState('Casa');
      const [formPriority, setFormPriority] = useState('Planejado');
      const [formStore, setFormStore] = useState('');
      const [formLink, setFormLink] = useState('');
      const [formNotes, setFormNotes] = useState('');

      useEffect(() => {
        localStorage.setItem('items', JSON.stringify(items));
      }, [items]);

      function createRoom() {
        if (!nameInput.trim()) return;
        const code = genCode();
        localStorage.setItem('roomCode', code);
        localStorage.setItem('myName', nameInput.trim());
        localStorage.setItem('items', JSON.stringify(DEMO_ITEMS));
        window.location.reload();
      }

      function joinRoom() {
        if (!nameInput.trim() || !codeInput.trim()) return;
        localStorage.setItem('roomCode', codeInput.toUpperCase());
        localStorage.setItem('myName', nameInput.trim());
        window.location.reload();
      }

      function addItem() {
        if (!formName.trim() || !formPrice) return;
        
        const newItem = { 
          id: Date.now(), 
          name: formName, 
          price: parseFloat(formPrice), 
          status: 'quero',
          brand: formBrand,
          category: formCategory,
          priority: formPriority,
          store: formStore,
          link: formLink,
          notes: formNotes
        };
        
        setItems([...items, newItem]);
        
        // Limpar todos os campos
        setFormName('');
        setFormPrice('');
        setFormBrand('');
        setFormCategory('Casa');
        setFormPriority('Planejado');
        setFormStore('');
        setFormLink('');
        setFormNotes('');
        setShowModal(false);
      }

      function deleteItem(id) {
        setItems(items.filter(i => i.id !== id));
      }

      function toggleStatus(id) {
        setItems(items.map(i => i.id === id ? { ...i, status: i.status === 'quero' ? 'comprado' : 'quero' } : i));
      }

      function leaveRoom() {
        localStorage.clear();
        window.location.reload();
      }

      const total = items.reduce((s, i) => s + i.price, 0);
      const bought = items.filter(i => i.status === 'comprado');

      if (setupStep === 'choose') {
        return (
          <div className="setup">
            <div className="setup-card">
              <div style={{ fontSize: 40, marginBottom: 12 }}>🛒</div>
              <h1>Lista de compras</h1>
              <p>Para dois. À vista, sem parcela.</p>
              <button className="btn" onClick={() => setSetupStep('create')}>Criar nova lista</button>
              <button className="btn btn-outline" onClick={() => setSetupStep('join')}>Entrar numa lista existente</button>
            </div>
          </div>
        );
      }

      if (setupStep === 'create') {
        return (
          <div className="setup">
            <div className="setup-card">
              <button className="back-btn" onClick={() => setSetupStep('choose')}>← voltar</button>
              <h2 style={{ fontSize: 18, fontWeight: 800, marginBottom: 20 }}>Criar lista</h2>
              <label className="label">SEU NOME</label>
              <input placeholder="Ex: João" value={nameInput} onChange={e => setNameInput(e.target.value)} />
              <button className="btn" onClick={createRoom} disabled={!nameInput.trim()}>Criar e entrar</button>
            </div>
          </div>
        );
      }

      if (setupStep === 'join') {
        return (
          <div className="setup">
            <div className="setup-card">
              <button className="back-btn" onClick={() => setSetupStep('choose')}>← voltar</button>
              <h2 style={{ fontSize: 18, fontWeight: 800, marginBottom: 20 }}>Entrar na lista</h2>
              <label className="label">SEU NOME</label>
              <input placeholder="Ex: Maria" value={nameInput} onChange={e => setNameInput(e.target.value)} />
              <label className="label">CÓDIGO DA LISTA</label>
              <input style={{ textTransform: 'uppercase', fontWeight: 700, fontSize: 18, letterSpacing: '0.1em' }} placeholder="ABC123" maxLength={6} value={codeInput} onChange={e => setCodeInput(e.target.value.toUpperCase())} />
              <button className="btn" onClick={joinRoom} disabled={!nameInput.trim() || !codeInput.trim()}>Entrar</button>
            </div>
          </div>
        );
      }

      return (
        <div className="container">
          <div className="header">
            <h1>Lista de compras</h1>
            <p>👤 {myName} · Código: <strong style={{ fontFamily: 'monospace' }}>{roomCode}</strong></p>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 16, fontSize: 13 }}>
              <div style={{ background: '#f7f5f0', padding: 12, borderRadius: 8, textAlign: 'center' }}>
                <div style={{ fontWeight: 800, fontSize: 16, color: '#1a1a1a' }}>R$ {total.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</div>
                <div style={{ color: '#6b6560', marginTop: 4 }}>Total</div>
              </div>
              <div style={{ background: '#f7f5f0', padding: 12, borderRadius: 8, textAlign: 'center' }}>
                <div style={{ fontWeight: 800, fontSize: 16, color: '#2d7a4f' }}>{bought.length}/{items.length}</div>
                <div style={{ color: '#6b6560', marginTop: 4 }}>Comprados</div>
              </div>
            </div>
            <button className="btn" onClick={() => setShowModal(true)}>+ Adicionar item</button>
            <button className="btn btn-outline" onClick={leaveRoom}>Sair desta lista</button>
          </div>

          <div>
            {items.map(item => (
              <div key={item.id} className="item" style={{ opacity: item.status === 'comprado' ? 0.6 : 1, transition: '0.2s' }}>
                
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                  <div style={{ flex: 1, paddingRight: '12px' }}>
                    <div className="item-name" style={{ textDecoration: item.status === 'comprado' ? 'line-through' : 'none' }}>
                      {item.name}
                    </div>
                    
                    {/* Exibição dos novos detalhes */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '5px', marginTop: '8px', fontSize: '12px', color: '#6b6560' }}>
                      
                      {item.brand && <div>🏷️ <strong>Modelo:</strong> {item.brand}</div>}
                      
                      <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                        {item.category && <span style={{ background: '#f0ede6', padding: '3px 8px', borderRadius: '6px', fontWeight: 600 }}>{item.category}</span>}
                        {item.priority && <span style={{ background: '#f0ede6', padding: '3px 8px', borderRadius: '6px', fontWeight: 600 }}>⏳ {item.priority}</span>}
                      </div>

                      {(item.store || item.link) && (
                        <div>
                          🛒 <strong>Onde:</strong> {item.link ? <a href={item.link} target="_blank" style={{ color: '#2d7a4f', textDecoration: 'none', fontWeight: 'bold' }}>{item.store || 'Acessar Link'} ↗</a> : item.store}
                        </div>
                      )}
                      
                      {item.notes && <div style={{ fontStyle: 'italic', background: '#f9f8f6', padding: '6px', borderRadius: '6px', marginTop: '2px' }}>"{item.notes}"</div>}
                    </div>

                  </div>

                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '12px' }}>
                    <div className="item-price">R$ {item.price.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</div>
                    <div style={{ display: 'flex', gap: '8px' }}>
                      <button onClick={() => toggleStatus(item.id)} style={{ background: item.status === 'comprado' ? '#2d7a4f' : 'white', color: item.status === 'comprado' ? 'white' : '#1a1a1a', border: `2px solid ${item.status === 'comprado' ? '#2d7a4f' : '#e8e4df'}`, borderRadius: '8px', width: '32px', height: '32px', cursor: 'pointer', fontSize: '16px', fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                        {item.status === 'comprado' ? '✓' : ''}
                      </button>
                      <button onClick={() => deleteItem(item.id)} style={{ background: 'none', border: 'none', color: '#c0392b', cursor: 'pointer', fontSize: '18px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>🗑️</button>
                    </div>
                  </div>
                </div>

              </div>
            ))}
          </div>

          <div className={`modal ${showModal ? 'active' : ''}`} onClick={() => setShowModal(false)}>
            <div className="modal-content" onClick={e => e.stopPropagation()}>
              <div className="modal-header">
                <h2>Novo item</h2>
                <button className="close-btn" onClick={() => setShowModal(false)}>✕</button>
              </div>
              
              <label className="label">NOME</label>
              <input placeholder="Ex: Cafeteira" value={formName} onChange={e => setFormName(e.target.value)} />
              
              <label className="label">PREÇO (R$)</label>
              <input type="number" placeholder="0,00" value={formPrice} onChange={e => setFormPrice(e.target.value)} />

              <label className="label">MARCA / MODELO (Opcional)</label>
              <input placeholder="Ex: Nespresso Essenza Mini" value={formBrand} onChange={e => setFormBrand(e.target.value)} />

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                <div>
                  <label className="label">CATEGORIA</label>
                  <select value={formCategory} onChange={e => setFormCategory(e.target.value)}>
                    <option value="Cozinha">Cozinha</option>
                    <option value="Casa">Casa</option>
                    <option value="Tech">Tech</option>
                    <option value="Móveis">Móveis</option>
                    <option value="Outros">Outros</option>
                  </select>
                </div>
                <div>
                  <label className="label">PRIORIDADE</label>
                  <select value={formPriority} onChange={e => setFormPriority(e.target.value)}>
                    <option value="Assim que der">Assim que der</option>
                    <option value="Planejado">Planejado</option>
                    <option value="Um dia">Um dia</option>
                  </select>
                </div>
              </div>

              <label className="label">LOJA / PESQUISA (Opcional)</label>
              <input placeholder="Ex: Amazon" value={formStore} onChange={e => setFormStore(e.target.value)} />

              <label className="label">LINK DO PRODUTO (Opcional)</label>
              <input placeholder="https://..." type="url" value={formLink} onChange={e => setFormLink(e.target.value)} />

              <label className="label">OBSERVAÇÕES (Opcional)</label>
              <textarea placeholder="Ex: Voltagem 220v, precisa comprar cápsulas também..." value={formNotes} onChange={e => setFormNotes(e.target.value)} style={{ resize: 'vertical', minHeight: '60px' }}></textarea>

              <button className="btn" onClick={addItem}>Adicionar à lista</button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
