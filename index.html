<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Compras</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #f7f5f0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e8e4df; }
    .btn { background: #1a1a1a; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="root">Carregando...</div>
  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyCLGKHLFDIDYcyH-VHG3RRF4YASDnGLFYE",
      authDomain: "listacompras-f5210.firebaseapp.com",
      projectId: "listacompras-f5210",
      storageBucket: "listacompras-f5210.firebasestorage.app",
      messagingSenderId: "1062082191988",
      appId: "1:1062082191988:web:159c3227ea89c8aaa8a721",
      measurementId: "G-FTNYDTWJWP"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function App() {
      const [code, setCode] = React.useState(localStorage.getItem('roomCode') || '');
      const [data, setData] = React.useState({ items: [], caixa: 0, reserva: 0 });

      React.useEffect(() => {
        if (code) {
          return db.collection("listas").doc(code).onSnapshot(doc => {
            if (doc.exists) setData(doc.data());
          });
        }
      }, [code]);

      const create = () => {
        const newCode = Math.random().toString(36).slice(2,8).toUpperCase();
        db.collection("listas").doc(newCode).set({ items: [], caixa: 0, reserva: 0 });
        localStorage.setItem('roomCode', newCode);
        setCode(newCode);
      };

      const addMoney = (type) => {
        const amount = parseFloat(prompt("Valor para adicionar:"));
        if (!amount) return;
        const update = {};
        update[type] = (data[type] || 0) + amount;
        db.collection("listas").doc(code).update(update);
      };

      if (!code) return <div className="container"><button className="btn" onClick={create}>Criar Nova Lista Sincronizada</button></div>;

      return (
        <div className="container">
          <div className="card">
            <h1>Lista: {code}</h1>
            <p>Caixa: R$ {data.caixa?.toFixed(2)} | Reserva: R$ {data.reserva?.toFixed(2)}</p>
            <button className="btn" onClick={() => addMoney('caixa')}>+ Dinheiro no Caixa</button>
            <button className="btn" style={{background:'#2d7a4f'}} onClick={() => addMoney('reserva')}>+ Reserva Emergência</button>
          </div>
          
          <button className="btn" onClick={() => {
            const name = prompt("Nome do item:");
            if(name) db.collection("listas").doc(code).update({
              items: firebase.firestore.FieldValue.arrayUnion({ id: Date.now(), name, price: 0 })
            });
          }}>+ Adicionar Item</button>

          {data.items.map((i, idx) => (
            <div key={i.id} className="card">{i.name}</div>
          ))}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
