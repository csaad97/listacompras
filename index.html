<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyCLGKHLFDIDYcyH-VHG3RRF4YASDnGLFYE",
      authDomain: "listacompras-f5210.firebaseapp.com",
      projectId: "listacompras-f5210",
      storageBucket: "listacompras-f5210.firebasestorage.app",
      messagingSenderId: "1062082191988",
      appId: "1:1062082191988:web:159c3227ea89c8aaa8a721",
      measurementId: "G-FTNYDTWJWP"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function App() {
      const [status, setStatus] = React.useState("Conectando...");
      
      React.useEffect(() => {
        db.collection("listas").doc("5EBBIK").get()
          .then((doc) => {
            if (doc.exists) setStatus("Conectado e lendo dados!");
            else setStatus("Conectado, mas o documento não existe.");
          })
          .catch((err) => setStatus("Erro: " + err.message));
      }, []);

      return <h1>{status}</h1>;
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
